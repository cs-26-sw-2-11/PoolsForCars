<!DOCTYPE html>
<html>
<head>
    <title>HTML Signup Form</title>
</head>


<body>
<div class="Signup Header">
<h1>Sign-Up</h1>
    <div class="wrap text">
    <fieldset>
    <legend>Personal Information</legend>
<form action="signup-records" id="signupForm" method="post">
    <label>First Name:</label>
        <input type="text" id="nameInput" name="firstName" required minlength="1" maxlength="25"><br>
    <label>Last Name:</label>
        <input type="text" id="lastNameInput" name="lastName" required minlength="1" maxlength="25"><br>
    <label>Address:</label>
        <input type="text" id="addressInput" name="address" required><br>
    <label>Postal Code:</label>
        <input type="number" id="postalCodeInput" name="postalCode" required minlength="4" maxlength="4"><br>
    <label>Phone:</label>
        <input type="tel" id="phoneInput" name="phone" required pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}"><br>
    <label>School Schedule:</label>
        <input type="text" id="scheduleInput" name="schedule"><br>
    </fieldset>
    <fieldset>
<legend>Carpooling preferences</legend>
    <label>Days with access to a car:</label>
        <input type="number" id="daysInput" name="days" required min="0"><br>
    <label>Walking distance for pickup: </label>
        <input type="number" id="walkingDistanceInput" name="walkingDistance" required min="0"><br>
    <label>Dropoff distance from destination: </label>
        <input type="number" id="dropoffRadiusInput" name="dropoffRadius" required min="0"><br>
    <label>Detour from original route: </label>
        <input type="number" id="detourInput" name="detour" required min="0"><br>
    </fieldset>
    <button id="signupSubmit" type="submit">
        Sign Up
    </button>
</div>
</form>
</body>
