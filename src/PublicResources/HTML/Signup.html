<!DOCTYPE html>
<html>
<head>
    <title>HTML Signup Form</title>
</head>
<body>
<div class="Signup Header">
<div class="title"> Sign Up </div>
    <fieldset>
    <legend>Personal Information</legend>
<form action="signup-records" id="signupForm" method="post">  
   <div class="input-box"> 
    <span class="details">Full Name</span>
    <input type="text" placeholder="Enter your name" required>
   </div>
    <label for firstNameInput>First Name:</label>
        <input type="text" id="firstNameInput" name="firstName" required minlength="1" maxlength="25"><br>
    <label for lastNameInput>Last Name:</label>
        <input type="text" id="lastNameInput" name="lastName" required minlength="1" maxlength="25"><br>
    <label for addressInput>Address:</label>
        <input type="text" id="addressInput" name="address" required><br>
    <label for postalCodeInput>Postal Code:</label>
        <input type="number" id="postalCodeInput" name="postalCode" required minlength="4" maxlength="4"><br>
    <label phoneInput>Phone:</label>
        <input type="tel" id="phoneInput" name="phone" required pattern="[0-9]{7}"><br>
    <label for scheduleInput>School Schedule:</label>
        <input type="text" id="scheduleInput" name="schedule"><br>
    </fieldset>
    <fieldset>
<legend>Carpooling preferences</legend>
    <label for daysInput>Days with access to a car:</label>
        <input type="number" id="daysInput" name="days" required min="0"><br>
    <label for walkingDistanceInput>Walking distance for pickup: </label>
        <input type="number" id="walkingDistanceInput" name="walkingDistance" required min="0"><br>
    <label for dropoffRadiusInput>Dropoff distance from destination: </label>
        <input type="number" id="dropoffRadiusInput" name="dropoffRadius" required min="0"><br>
    <label for detourInput>Detour from original route: </label>
        <input type="number" id="detourInput" name="detour" required min="0"><br>
    </fieldset>
    <button id="signupSubmit" type="submit">
        Sign Up
    </button>
</div>
</form>
</body>
