<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../CSS/Frontendstyle.css">
    <title>HTML Signup Form</title>
</head>
<body>
<div class="signup-header">
<div class="title"> Sign Up </div>
    <fieldset>
    <div class="legend">Personal Information</div>
<form action="signup-records" id="signupForm" method="post">  
   <div class="user-details">
   <div class="input-box"> 
    <label class="details" for="firstNameInput">First Name</label>
    <input type="text" id="firstNameInput" name="firstName" required>
   </div>
    <div class="input-box"> 
    <label class="details" for="lastNameInput">Last Name</label>
    <input type="text" id="lastNameInput" name="lastName" required>
   </div>
    <div class="input-box"> 
    <label class="details" for="addressInput">Adresse</label>
        <input type="text" id="addressInput" name="address" required>
    </div>
    <div class="input-box">
        <label class="details" for="postalCodeInput">Postal Code</label>
        <input type="number" id="postalCodeInput" name="postalCode" required min="1000" max="9990">
    </div>
    <div class="input-box">
        <label class="details" for="phoneInput">Phone</label>
        <input type="tel" id="phoneInput" name="phone" required pattern="[0-9]{8}">
    </div>
    </div>
    </fieldset>
    </br>
    <fieldset>
<div class="legend">Carpooling preferences</div>
   </br>     
   <div class="user-details">
   <div class="input-box">
    <label class="details" for="carDaysInput">Days with access to car per week</label>
        <input type="number" id="carDaysInput" name="CarDays" required min="0" max="5">
   </div>
    <div class="input-box">
        <label class="details" for="walkingDistanceInput">Walking distance for pickup</label>
        <input type="number" id="walkingDistanceInput" name="walkingDistance" required min="0">
    </div>
    <div class="input-box">
        <label class="details" for="dropoffRadiusInput">Dropoff distance from destination</label>
        <input type="number" id="dropoffRadiusInput" name="dropoffRadius" required min="0">
    </div>
    <div class="input-box">
        <label class="details" for="detourInput">Detour from original route in minutes</label>
        <input type="number" id="detourInput" name="detour" required min="0">
    </div>
    </div>
    </fieldset>
    <button id="signupSubmit" type="submit"  value="">
        Sign Up
    </button>
    <p class="login-text">Already have an account? </br>
    <a href="https://media.newyorker.com/photos/59095bb86552fa0be682d9d0/master/pass/Monkey-Selfie.jpg"> 
    Login </a>
    </p>
</body>
</div>
</body>
