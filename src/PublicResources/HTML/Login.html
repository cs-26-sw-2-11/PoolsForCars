<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="Frontendstyle.css">
    <title>HTML Login Form</title>
</head>


<body>
    <div class="header">
    <div class="tittle"></div><span> Carpooling</span>
    <h4>Enter your last name and phone number </h2>
    <form action="login-records" id="loginForm" method="post">
        <label for ="lastNameInput">Last Name: </label>
            <input type="text" id="lastNameInput" name="lastName"
                placeholder="Enter your Last Name" required minlength="1" maxlength="25">
         <label for="phoneInput"> Phone Number:</label>
            <input type="tel" id="phoneInput" name="phone"
                placeholder="Enter your Phone Number" required pattern="[0-9][0-9]{4}">
        <div class="wrapper">
        <button id="loginSubmit" type="submit">
            Login
        </button>
     </div>
     </form>
