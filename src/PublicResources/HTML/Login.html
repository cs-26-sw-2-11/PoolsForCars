<!DOCTYPE html>
<html>
<head>
    <title>HTML Login Form</title>
</head>

<body>
    <div class="Login Header">
    <h1>Carpooling</h1>
    <h2>Enter your name and phone number </h2>

    <form action="login-records" id="loginForm" method="post">
        <label for ="nameInput">Name: </label>
            <input type="text" id="nameInput" name="nameInput"
                placeholder="Enter your Name" required minlength="1" maxlength="25">

         <label for="phoneInput"> Phone Number:</label>
            <input type="tel" id="phoneInput" name="phoneInput"
                placeholder="Enter your Phone Number" required pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}">

        <div class="wrap text">
        <button id="loginSubmit" type="submit"> 
            Login
        </button>
     </div>
     </form>
<a href="https://media.newyorker.com/photos/59095bb86552fa0be682d9d0/master/pass/Monkey-Selfie.jpg">
Create an account
</a>
    
<div id="loginMessage"></div>
</body>
</html>
